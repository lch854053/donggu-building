name: Update K-apt Data

on:
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 00:00 UTC
  workflow_dispatch:      # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update K-apt data
        run: npm run update-kapt
        env:
          APT_SERVICE_KEY: ${{ secrets.APT_SERVICE_KEY }}

      - name: Collect apartment polygon data for map tab
        run: npm run collect-apt-geo
        env:
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}

      - name: Update officetel data
        run: npm run update-officetel
        env:
          ARCH_SERVICE_KEY: ${{ secrets.ARCH_SERVICE_KEY }}

      - name: Validate generated JSON (prevent empty/regressed data)
        run: |
          set -e
          # apt_geo.json이 빈 배열이거나 파싱 불가면 커밋하지 않는다.
          # 회귀(0add14c): VWorld API 대량 실패 시 빈 [] 이 머지되어
          # 지도 탭 공동주택 조회가 동작하지 않았음.
          apt_count=$(node -e "try{const d=require('./apt_geo.json');console.log(Array.isArray(d)?d.length:-1)}catch{console.log(-1)}")
          echo "apt_geo.json 레코드 수: $apt_count"
          if [ "$apt_count" -le 0 ] 2>/dev/null; then
            echo "::error::apt_geo.json이 비어 있거나 파싱 실패 ($apt_count). 커밋 중단."
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add aptlist_donggu.json apt_geo.json aptlist_extra_donggu.json
            git commit -m "chore: weekly K-apt data + apartment polygon + officetel update"
            git push
          else
            echo "No changes to commit"
          fi

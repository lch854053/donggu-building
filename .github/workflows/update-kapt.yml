name: Update K-apt Data

on:
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 00:00 UTC
  workflow_dispatch:      # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update K-apt data
        run: npm run update-kapt
        env:
          APT_SERVICE_KEY: ${{ secrets.APT_SERVICE_KEY }}

      - name: Collect apartment polygon data for map tab
        run: npm run collect-apt-geo
        env:
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}

      - name: Update officetel data
        run: npm run update-officetel
        env:
          ARCH_SERVICE_KEY: ${{ secrets.ARCH_SERVICE_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add aptlist_donggu.json apt_geo.json aptlist_extra_donggu.json
            git commit -m "chore: weekly K-apt data + apartment polygon + officetel update"
            git push
          else
            echo "No changes to commit"
          fi

name: Update Odcloud Apartment Data

on:
  schedule:
    - cron: '0 0 1 * *'  # 매월 1일 00:00 UTC
  workflow_dispatch:      # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update odcloud apartment data
        run: npm run update-odcloud
        env:
          ODCLOUD_SERVICE_KEY: ${{ secrets.ODCLOUD_SERVICE_KEY }}
          JUSO_CONFM_KEY: ${{ secrets.JUSO_CONFM_KEY }}

      - name: Collect apartment polygon data for map tab
        run: npm run collect-apt-geo
        env:
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}
          BLD_SERVICE_KEY: ${{ secrets.BLD_SERVICE_KEY }}

      - name: Validate generated JSON (prevent empty/regressed data)
        run: |
          set -e
          # apt_geo.json이 빈 배열이거나 파싱 불가면 커밋하지 않는다 (0add14c 회귀 재발 방지).
          apt_count=$(node -e "try{const d=require('./apt_geo.json');console.log(Array.isArray(d)?d.length:-1)}catch{console.log(-1)}")
          echo "apt_geo.json 레코드 수: $apt_count"
          if [ "$apt_count" -le 0 ] 2>/dev/null; then
            echo "::error::apt_geo.json이 비어 있거나 파싱 실패 ($apt_count). 커밋 중단."
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add aptlist_odcloud_donggu.json apt_geo.json
            git commit -m "chore: monthly odcloud apartment data + apartment polygon update"
            git push
          else
            echo "No changes to commit"
          fi
